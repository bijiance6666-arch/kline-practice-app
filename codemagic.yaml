# Codemagic CI/CD Configuration
# Documentation: https://docs.codemagic.io/yaml/yaml-getting-started/

workflows:
  android-release:
    name: Android Release APK
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      java: 17
    scripts:
      - flutter pub get
      - flutter build apk --release
    artifacts:
      - build/**/outputs/**/*.apk
    publishing:
      email:
        recipients:
          - 229370058@qq.com
